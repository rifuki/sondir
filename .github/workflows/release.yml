name: release
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
jobs:
  build:
    strategy:
      matrix:
        include:
          - { os: macos-14, target: aarch64-apple-darwin }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: "${{ matrix.target }}" }
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --target ${{ matrix.target }}
      - name: package (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf sondir-${{ github.ref_name }}-${{ matrix.target }}.tar.gz sondir
      - name: package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/sondir.exe" -DestinationPath "target/${{ matrix.target }}/release/sondir-${{ github.ref_name }}-${{ matrix.target }}.zip"
      - uses: softprops/action-gh-release@v3
        with:
          files: |
            target/${{ matrix.target }}/release/sondir-*.tar.gz
            target/${{ matrix.target }}/release/sondir-*.zip
