# Publish to crates.io. Runs on a version tag (after CI is green) or on manual
# dispatch. Requires the repo secret CARGO_REGISTRY_TOKEN (create a token at
# https://crates.io/settings/tokens with the publish-new + publish-update
# scopes, then: gh secret set CARGO_REGISTRY_TOKEN).
name: publish

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  crates-io:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Gate the publish on the full suite — a broken build must never ship.
      - name: test
        run: cargo test --release

      # `--locked` publishes exactly what CI tested. cargo is idempotent-safe:
      # re-publishing an existing version is a hard error, so a re-run can't
      # clobber a release.
      - name: publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked
